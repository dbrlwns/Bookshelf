{% extends 'base.html' %}

{% block title %}{{ blog.title }}{% endblock %}

{% block extra_head %}
<style>
    .blog-detail-shell {
        max-width: 880px;
        margin: 0 auto;
    }

    .blog-detail-card {
        border: 1px solid var(--bs-border-color);
        border-radius: 1.5rem;
        background-color: var(--bs-tertiary-bg);
        box-shadow: 0 18px 42px rgba(15, 23, 42, 0.06);
        overflow: hidden;
    }

    .blog-detail-card .card-body {
        padding: 2rem;
    }

    .blog-detail-title {
        color: var(--bs-emphasis-color);
        letter-spacing: -0.02em;
        line-height: 1.2;
    }

    .blog-detail-meta {
        color: var(--bs-secondary-color);
    }

    .blog-detail-content {
        color: var(--bs-body-color);
        line-height: 1.85;
    }

    .blog-detail-content img {
        max-width: 100%;
        height: auto;
        border-radius: 1rem;
    }

    .blog-detail-content pre {
        margin: 1.25rem 0;
        border-radius: 1rem;
    }

    html[data-bs-theme="dark"] .blog-detail-card {
        background-color: #161b22;
        border-color: rgba(255, 255, 255, 0.08);
        box-shadow: 0 22px 48px rgba(0, 0, 0, 0.32);
    }
</style>
{% endblock %}

{% block content %}
<section class="blog-detail-shell">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="{% url 'blog_list' %}" class="btn btn-outline-secondary">목록으로</a>
    </div>

    <article class="card blog-detail-card">
        <div class="card-body">
            <div class="blog-detail-meta mb-3">
                <span>{{ blog.author.username }}</span>
                <span class="mx-2">·</span>
                <span>{{ blog.created_at|date:"Y.m.d H:i" }}</span>
            </div>
            <h1 class="display-6 fw-bold blog-detail-title mb-4">{{ blog.title }}</h1>
            <div class="blog-detail-content blog-content">
                {{ blog.content|safe }}
            </div>
        </div>
    </article>
</section>
{% endblock %}
