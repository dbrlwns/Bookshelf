{% extends 'base.html' %}


{% block content %}
    <h1>채팅방 목록</h1>
    {% if rooms %}
        <ul>
            {% for room in rooms %}
                <li>
                    <a href="{% url 'chat_room' room.slug %}">{{ room.name }}</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>개설된 채팅방이 없습니다.</p>
    {% endif %}
{% endblock %}
